name: Generate PDF Manual

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]
  workflow_dispatch:

jobs:
  generate-pdf:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-nanum fonts-nanum-coding

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer pdf-lib

      - name: Generate PDF from live site
        run: |
          node - << 'EOF'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');

          const BASE = 'https://jhyung91-lgtm.github.io/accounting';

          async function main() {
            const files = fs.readdirSync('_pages')
              .filter(f => f.endsWith('.md'))
              .sort();

            const urls = files.map(f => {
              const name = f.replace('.md', '');
              return `${BASE}/pages/${encodeURIComponent(name)}/`;
            });

            console.log(`Generating PDF for ${urls.length} pages...`);

            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--font-render-hinting=none'],
            });

            const pdfBuffers = [];
            for (const url of urls) {
              console.log('→', url);
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 900 });
              await page.emulateMediaType('screen');
              await page.goto(url, { waitUntil: 'networkidle0', timeout: 60000 });
              await page.waitForFunction(() => document.fonts.ready);

              await page.evaluate(() => {
                document.querySelectorAll(
                  '.book-summary, .navigation-prev, .navigation-next, .book-header, #pw-overlay'
                ).forEach(el => el.remove());
                const body = document.querySelector('.book-body');
                if (body) { body.style.left = '0'; body.style.top = '0'; }
                const inner = document.querySelector('.page-inner');
                if (inner) {
                  inner.style.maxWidth = '100%';
                  inner.style.padding = '30px 50px';
                }
              });

              const pdf = await page.pdf({
                format: 'A4',
                printBackground: true,
                margin: { top: '1.5cm', bottom: '1.5cm', left: '1cm', right: '1cm' }
              });

              pdfBuffers.push(pdf);
              await page.close();
            }

            await browser.close();

            const merged = await PDFDocument.create();
            for (const buf of pdfBuffers) {
              const doc = await PDFDocument.load(buf);
              const pages = await merged.copyPages(doc, doc.getPageIndices());
              pages.forEach(p => merged.addPage(p));
            }

            fs.writeFileSync('assets/manual.pdf', await merged.save());
            console.log('Done!');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/manual.pdf
          git diff --staged --quiet || git commit -m "chore: update manual PDF [skip ci]"
          git push
